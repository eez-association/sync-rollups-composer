name: Label Issues

on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Auto-label by title prefix
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const labels = [];

            // Priority
            if (title.includes('[p0]')) labels.push('P0-critical');
            else if (title.includes('[p1]')) labels.push('P1-high');
            else if (title.includes('[p2]')) labels.push('P2-medium');
            else if (title.includes('[p3]')) labels.push('P3-low');

            // Type
            if (title.includes('[bug]')) labels.push('bug');
            if (title.includes('[feature]')) labels.push('enhancement');
            if (title.includes('[test]')) labels.push('testing');
            if (title.includes('[security]')) labels.push('security');
            if (title.includes('[docs]')) labels.push('documentation');

            // Area
            if (title.includes('[cross-chain]')) labels.push('cross-chain');
            if (title.includes('[bridge]')) labels.push('bridge');
            if (title.includes('[driver]')) labels.push('driver');
            if (title.includes('[derivation]')) labels.push('derivation');
            if (title.includes('[proposer]')) labels.push('proposer');
            if (title.includes('[proxy]')) labels.push('proxy');
            if (title.includes('[docker]')) labels.push('docker');
            if (title.includes('[ui]')) labels.push('ui');
            if (title.includes('[contracts]')) labels.push('contracts');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }
