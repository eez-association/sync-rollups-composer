name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_docker_e2e:
        description: 'Run Docker E2E tests'
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ── Fast lint (no compilation) ─────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --all --check

  # ── Build once, reuse across test jobs ─────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev pkg-config libssl-dev cmake
      - name: Build workspace
        run: cargo build --workspace --all-targets
      - name: Save build artifacts
        uses: actions/cache/save@v4
        with:
          path: |
            target/
            ~/.cargo/registry/
            ~/.cargo/git/
          key: build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.sha }}

  clippy:
    name: Clippy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            target/
            ~/.cargo/registry/
            ~/.cargo/git/
          key: build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.sha }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev pkg-config libssl-dev cmake
      - run: cargo clippy --workspace --all-features -- -D warnings

  # ── Unit tests (no external deps) ─────────────────────────────
  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            target/
            ~/.cargo/registry/
            ~/.cargo/git/
          key: build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.sha }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev pkg-config libssl-dev cmake
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --lib

  # ── Integration tests (need anvil + contract artifacts) ────────
  integration-tests:
    name: Integration Tests (EVM Executor)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            target/
            ~/.cargo/registry/
            ~/.cargo/git/
          key: build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.sha }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev pkg-config libssl-dev cmake
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Compile contracts
        run: |
          cd contracts && forge build
          cd sync-rollups && forge build
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --test evm_executor

  # ── E2E tests (need anvil + contract artifacts) ────────────────
  e2e-tests:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            target/
            ~/.cargo/registry/
            ~/.cargo/git/
          key: build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.sha }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev pkg-config libssl-dev cmake
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Compile contracts
        run: |
          cd contracts && forge build
          cd sync-rollups && forge build
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --test e2e_anvil

  # ── Docker build (validates Dockerfile, GHA cache) ─────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/shared/Dockerfile
          push: false
          tags: sync-rollup-composer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Docker E2E (full stack: L1 + builder + fullnodes) ──────────
  # Runs on push to main or manual trigger. Tests bridge deposits,
  # cross-chain calls, and state root convergence across nodes.
  docker-e2e:
    name: Docker E2E
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' && inputs.run_docker_e2e
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            target/
            ~/.cargo/registry/
            ~/.cargo/git/
          key: build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.sha }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev pkg-config libssl-dev cmake

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build release binary
        run: cargo build --release

      - name: Start Docker stack
        run: |
          docker compose -f deployments/testnet-eez/docker-compose.yml \
                         -f deployments/testnet-eez/docker-compose.dev.yml up -d
        env:
          COMPOSE_PROJECT_NAME: ci-e2e

      - name: Wait for builder to be healthy
        run: |
          echo "Waiting for builder (up to 5 min)..."
          for i in $(seq 1 60); do
            health=$(curl -s --max-time 2 http://localhost:9560/health 2>/dev/null || echo "")
            if echo "$health" | grep -q '"mode":"Builder"'; then
              echo "Builder healthy: $health"
              exit 0
            fi
            echo "  [$i/60] $health"
            sleep 5
          done
          echo "FATAL: builder did not become healthy in 5 minutes"
          docker compose -f deployments/testnet-eez/docker-compose.yml \
                         -f deployments/testnet-eez/docker-compose.dev.yml logs builder --tail 50
          exit 1

      - name: Wait for blocks to stabilize
        run: sleep 30

      - name: Run bridge E2E test
        run: bash scripts/e2e/bridge-health-check.sh

      - name: Run cross-chain E2E test
        run: bash scripts/e2e/crosschain-health-check.sh

      - name: Run multi-call E2E test
        run: bash scripts/e2e/test-multi-call-cross-chain.sh

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Builder logs ==="
          docker compose -f deployments/testnet-eez/docker-compose.yml \
                         -f deployments/testnet-eez/docker-compose.dev.yml logs builder --tail 100
          echo "=== Fullnode1 logs ==="
          docker compose -f deployments/testnet-eez/docker-compose.yml \
                         -f deployments/testnet-eez/docker-compose.dev.yml logs fullnode1 --tail 50
          echo "=== Deploy logs ==="
          docker compose -f deployments/testnet-eez/docker-compose.yml \
                         -f deployments/testnet-eez/docker-compose.dev.yml logs deploy --tail 50
          echo "=== Health ==="
          curl -s http://localhost:9560/health || echo "unreachable"

      - name: Tear down
        if: always()
        run: |
          docker compose -f deployments/testnet-eez/docker-compose.yml \
                         -f deployments/testnet-eez/docker-compose.dev.yml down -v
