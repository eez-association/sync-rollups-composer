# deployments/devnet-eez/docker-compose.explorer.yml — EEZ devnet explorer overrides
#
# Adds devnet-specific config on top of the shared explorer definitions.
# Use together with the shared explorer overlay:
#
#   docker compose -f deployments/devnet-eez/docker-compose.yml \
#                  -f deployments/devnet-eez/docker-compose.dev.yml \
#                  -f deployments/shared/docker-compose.explorer.yml \
#                  -f deployments/devnet-eez/docker-compose.explorer.yml up -d
#
# Domain routing via external nginx — see nginx.conf in this directory.

services:
  l2-db:
    volumes:
      - l2-db-data:/var/lib/postgresql/data

  l2-explorer:
    volumes:
      - ./genesis-l2.json:/genesis/genesis.json:ro
    environment:
      SECRET_KEY_BASE: "88NtB48ear7+wMSf0IQuWDAAazhpb31qyc7GiyspBP2vh7t5zlCsF5QDv76chXeN"
      BLOCKSCOUT_HOST: ${BLOCKSCOUT_L2_HOST:-l2.devnet.local}
      CHAIN_SPEC_PATH: "/genesis/genesis.json"
      CHAIN_ID: "42070"
    ports:
      - "5003:4000"   # L2 Explorer API (backend) — override shared 4003

  l2-frontend:
    environment:
      NEXT_PUBLIC_API_HOST: ${BLOCKSCOUT_L2_HOST:-l2.devnet.local}
      NEXT_PUBLIC_API_PORT: "443"
      NEXT_PUBLIC_API_PROTOCOL: https
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: wss
      NEXT_PUBLIC_APP_HOST: ${BLOCKSCOUT_L2_HOST:-l2.devnet.local}
      NEXT_PUBLIC_APP_PORT: "443"
      NEXT_PUBLIC_APP_PROTOCOL: https
      NEXT_PUBLIC_NETWORK_ID: "42070"
    ports:
      - "5001:3000"   # L2 Explorer Frontend — override shared 4001

  # Contract verification — runs after explorers are up
  verify-contracts:
    image: ghcr.io/foundry-rs/foundry:v1.6.0-rc1
    user: root
    entrypoint: ["bash", "-c"]
    command:
      - |
        cd /app
        bash scripts/verify-contracts.sh
    volumes:
      - ../../contracts:/app/contracts
      - ../shared/scripts:/app/scripts
      - shared:/shared
    environment:
      SHARED_DIR: /shared
      CONTRACTS_DIR: /app/contracts
      L1_RPC_URL: http://l1:8545
      L1_EXPLORER: http://l1-explorer:4000
      L2_EXPLORER: http://l2-explorer:4000
    depends_on:
      l1-explorer:
        condition: service_started
      l2-explorer:
        condition: service_started
      builder:
        condition: service_healthy

volumes:
  l2-db-data:
