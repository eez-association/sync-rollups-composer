# deployments/devnet-eez/docker-compose.dev.yml — Dev overlay for EEZ devnet
#
# Mounts locally compiled binary for fast iteration without Docker rebuilds.
#
# First time:
#   cargo build --release
#   sudo docker compose -f deployments/devnet-eez/docker-compose.yml \
#                       -f deployments/devnet-eez/docker-compose.dev.yml up -d
#
# Iterate (no rebuild, no down, no re-deploy):
#   cargo build --release
#   sudo docker compose -f deployments/devnet-eez/docker-compose.yml \
#                       -f deployments/devnet-eez/docker-compose.dev.yml \
#                       restart builder fullnode1 fullnode2

services:
  l1:
    command:
      - node
      - --dev
      - --dev.block-time=${L1_BLOCK_TIME:-12s}
      - --chain=/genesis/l1-genesis.json
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8545
      - --http.api=debug,trace,txpool,eth,net,web3
      - --http.corsdomain=*
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=8546
      - --ws.api=debug,trace,txpool,eth,net,web3
      - --ws.origins=*
      - --log.stdout.format=terminal

  deploy:
    build:
      context: ../..
      dockerfile: deployments/shared/Dockerfile.dev
      target: deploy
    image: based-rollup:dev-deploy
    environment:
      DEPLOY_FLASH_LOAN: "true"
    volumes:
      - ../../target/${BUILD_PROFILE:-release}/based-rollup:/usr/local/bin/based-rollup
      - ./genesis-l2.json:/etc/based-rollup/genesis.json
      - ../../contracts/out:/app/contracts/out
      - ../../contracts/sync-rollups-protocol/out:/app/contracts/sync-rollups-protocol/out
      - ../../contracts/sync-rollups-protocol/cache:/app/contracts/sync-rollups-protocol/cache

  deploy-l2:
    build:
      context: ../..
      dockerfile: deployments/shared/Dockerfile.dev
      target: deploy
    image: based-rollup:dev-deploy
    environment:
      DEPLOY_FLASH_LOAN: "true"
    volumes:
      - ../../contracts/sync-rollups-protocol/out:/app/contracts/sync-rollups-protocol/out
      - ../../contracts/sync-rollups-protocol/cache:/app/contracts/sync-rollups-protocol/cache

  builder:
    build:
      context: ../..
      dockerfile: deployments/shared/Dockerfile.dev
      target: runtime
    image: based-rollup:dev
    environment:
      GENESIS: /shared/genesis.json
      BLOCK_TIME: "${BLOCK_TIME:-12}"
    volumes:
      - ../../target/${BUILD_PROFILE:-release}/based-rollup:/usr/local/bin/based-rollup
      - ./genesis-l2.json:/etc/based-rollup/genesis.json

  fullnode1:
    image: based-rollup:dev
    environment:
      GENESIS: /shared/genesis.json
      BLOCK_TIME: "${BLOCK_TIME:-12}"
    volumes:
      - ../../target/${BUILD_PROFILE:-release}/based-rollup:/usr/local/bin/based-rollup
      - ./genesis-l2.json:/etc/based-rollup/genesis.json

  fullnode2:
    image: based-rollup:dev
    environment:
      GENESIS: /shared/genesis.json
      BLOCK_TIME: "${BLOCK_TIME:-12}"
    volumes:
      - ../../target/${BUILD_PROFILE:-release}/based-rollup:/usr/local/bin/based-rollup
      - ./genesis-l2.json:/etc/based-rollup/genesis.json
