# deployments/chiado-10200/docker-compose.explorer.yml — Chiado explorer overrides
#
# Adds Chiado-specific config on top of the shared explorer definitions.
# Use together with the shared explorer overlay:
#
#   docker compose -f deployments/chiado-10200/docker-compose.yml \
#                  -f deployments/shared/docker-compose.explorer.yml \
#                  -f deployments/chiado-10200/docker-compose.explorer.yml \
#                  --env-file deployments/chiado-10200/.env up -d

services:
  l2-db:
    volumes:
      - chiado-l2-db-data:/var/lib/postgresql/data

  l2-explorer:
    ports:
      - "4003:4000"   # L2 Explorer API (backend)

  l2-frontend:
    ports:
      - "4001:3000"   # L2 Explorer Frontend

volumes:
  chiado-l2-db-data:
